<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Certificate Verification | MAS Training</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f3f4f6; }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="mb-8 text-center">
        <h1 class="text-3xl font-bold text-[#1e293b]">MAS <span class="text-[#ab8038]">Training</span></h1>
        <p class="text-gray-500 mt-2 font-semibold">Official Credential Verification Portal</p>
    </div>

    <div id="result-container" class="w-full max-w-md glass-card rounded-2xl overflow-hidden shadow-xl transition-all">
        
        <div id="loading-state" class="p-8 text-center">
            <i data-lucide="loader-2" class="w-12 h-12 mx-auto text-[#ab8038] animate-spin mb-4"></i>
            <h2 class="text-xl font-semibold text-gray-700">Verifying Credentials...</h2>
        </div>

        <div id="error-state" class="p-8 text-center hidden">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i data-lucide="x-circle" class="w-8 h-8 text-red-500"></i>
            </div>
            <h2 class="text-xl font-bold text-gray-800 mb-2">Invalid Certificate!</h2>
            <p class="text-gray-600">No matching records found for this ID or Certificate Number.</p>
        </div>

        <div id="success-state" class="hidden">
            <div class="bg-emerald-500 p-6 text-center text-white">
                <i data-lucide="check-circle-2" class="w-12 h-12 mx-auto mb-2"></i>
                <h2 class="text-2xl font-bold tracking-wide">VERIFIED & VALID</h2>
                <p class="text-emerald-100 text-sm mt-1 font-medium" id="display-issue-date">Issued On: </p>
            </div>

            <div class="p-2 space-y-1 bg-gray-50">
                
                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                    <p class="text-xs text-gray-400 mb-1 font-semibold uppercase tracking-wider">Name</p>
                    <p class="text-lg font-bold text-gray-800" id="val-name">---</p>
                </div>

                <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100">
                    <p class="text-xs text-gray-400 mb-1 font-semibold uppercase tracking-wider">Course</p>
                    <p class="text-md font-bold text-gray-800" id="val-course">---</p>
                </div>

                <div class="grid grid-cols-2 gap-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 mb-1 font-semibold uppercase tracking-wider">Cert Number</p>
                        <p class="text-md font-bold text-gray-800" id="val-cert">---</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 mb-1 font-semibold uppercase tracking-wider">ID Number</p>
                        <p class="text-md font-bold text-gray-800" id="val-id">---</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-1">
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 mb-1 font-semibold uppercase tracking-wider">Issue Date</p>
                        <p class="text-md font-bold text-gray-800" id="val-issue">---</p>
                    </div>
                    <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-100 text-center">
                        <p class="text-xs text-gray-400 mb-1 font-semibold uppercase tracking-wider">Expiry Date</p>
                        <p class="text-md font-bold text-red-600" id="val-expiry">---</p>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <script type="module">
        import { api } from '/js/api.js';
        lucide.createIcons();

        document.addEventListener('DOMContentLoaded', async () => {
            const urlParams = new URLSearchParams(window.location.search);
            const traineeId = urlParams.get('id');

            const loadingState = document.getElementById('loading-state');
            const errorState = document.getElementById('error-state');
            const successState = document.getElementById('success-state');

            if (!traineeId) {
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
                return;
            }

            try {
                const res = await api.getTrainees();
                
                if (res.success) {
                    const traineeIndex = res.trainees.findIndex(t => t.id === traineeId || String(t.idNo) === traineeId);
                    const trainee = res.trainees[traineeIndex];

                    if (trainee) {
                        const cleanName = (trainee.fullName || '').replace(/^-\s*/, '').trim();
                        
                        const createdAt = trainee.createdAt ? new Date(trainee.createdAt) : new Date();
                        const issueDate = `${createdAt.getDate()}-${createdAt.getMonth() + 1}-${createdAt.getFullYear()}`;
                        const expDate = `${createdAt.getDate()}-${createdAt.getMonth() + 1}-${createdAt.getFullYear() + 2}`;
                        
                        const certNumber = `MAS_${String(traineeIndex + 1).padStart(3, '0')}`;

                        document.getElementById('display-issue-date').textContent = `Issued On: ${issueDate}`;
                        document.getElementById('val-name').textContent = cleanName;
                        document.getElementById('val-course').textContent = trainee.courseName || 'H2S & SCBA SAFETY COURSE';
                        document.getElementById('val-id').textContent = trainee.idNo || 'N/A';
                        document.getElementById('val-cert').textContent = certNumber;
                        document.getElementById('val-issue').textContent = issueDate;
                        document.getElementById('val-expiry').textContent = expDate;

                        loadingState.classList.add('hidden');
                        successState.classList.remove('hidden');
                    } else {
                        loadingState.classList.add('hidden');
                        errorState.classList.remove('hidden');
                    }
                } else {
                    throw new Error('Failed to fetch data');
                }
            } catch (error) {
                console.error('Verification Error:', error);
                loadingState.classList.add('hidden');
                errorState.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
